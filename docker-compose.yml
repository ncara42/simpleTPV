services:
  postgres:
    image: postgres:16-alpine
    container_name: simpletpv-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-simpletpv}
    ports:
      - '127.0.0.1:5434:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-postgres}']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    # Pin a 7.4 (>=7.4.3 corrige CVE-2025-49844 / RediShell, RCE CVSS 10). La
    # etiqueta mutable `7-alpine` podía resolver a una build vulnerable.
    image: redis:7.4-alpine
    container_name: simpletpv-redis
    # requirepass: aunque hoy el puerto solo escucha en loopback, exigir contraseña
    # evita acceso sin auth si la red Docker queda expuesta (defensa en profundidad).
    command: ['redis-server', '--requirepass', '${REDIS_PASSWORD:-redis_dev_password}']
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis_dev_password}
    ports:
      - '127.0.0.1:6381:6379'
    healthcheck:
      test: ['CMD-SHELL', 'redis-cli -a "$$REDIS_PASSWORD" ping']
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
