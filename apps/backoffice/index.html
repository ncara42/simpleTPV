<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>simpleTPV Backoffice</title>
    <script>
      // Fija el tema (claro/oscuro) ANTES de pintar, evitando parpadeo. Lee
      // localStorage('theme'); si no hay, la preferencia del SO. El toggle está
      // en el clúster flotante (lib/theme.ts); las reglas dark en theme-geist.css.
      (function () {
        try {
          var t = localStorage.getItem('theme');
          if (t !== 'light' && t !== 'dark') {
            t = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
          }
          document.documentElement.setAttribute('data-theme', t);
        } catch (e) {
          /* sin storage/matchMedia: queda en claro por defecto */
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
