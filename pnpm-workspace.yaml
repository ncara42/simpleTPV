packages:
  - 'apps/*'
  - 'packages/*'

# pnpm 11 trata `ERR_PNPM_IGNORED_BUILDS` como fatal (default). Lo desactivamos
# para no bloquear install cuando subdependencias transitivas tienen scripts.
strictDepBuilds: false

onlyBuiltDependencies:
  - '@nestjs/core'
  - '@prisma/client'
  - '@prisma/engines'
  - '@swc/core'
  - esbuild
  - prisma

peerDependencyRules:
  ignoreMissing:
    - eslint
  allowedVersions:
    eslint: '10'

# Override de esbuild: vite 8 acepta 0.25 sin problema, pero por defecto
# pnpm puede resolver 0.28 que tiene breaking change con target ES2020
# (transform fails en destructuring). Pinneamos a ~0.25 (versión fixed
# para el CVE GHSA-67mh-4wv8-2f99 que OSV detectó como transitivo).
overrides:
  esbuild: ~0.25.0

allowBuilds:
  '@prisma/engines': set this to true or false
  prisma: set this to true or false
