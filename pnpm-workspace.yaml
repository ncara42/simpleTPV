packages:
  - 'apps/*'
  - 'packages/*'

# pnpm 11 trata `ERR_PNPM_IGNORED_BUILDS` como fatal (default). Lo desactivamos
# para no bloquear install cuando subdependencias transitivas tienen scripts.
strictDepBuilds: false

onlyBuiltDependencies:
  - '@nestjs/core'
  - '@prisma/client'
  - '@prisma/engines'
  - '@swc/core'
  - esbuild
  - prisma

peerDependencyRules:
  ignoreMissing:
    - eslint
  allowedVersions:
    eslint: '10'

# Overrides:
# - esbuild: subido a >=0.28.1 para el aviso GHSA-gv7w-rqvm-qjhr (CVSS 8.1) que
#   OSV detecta en <0.28.1 (transitivo). Antes pinneábamos ~0.25 por un breaking
#   change de 0.28 con target ES2020 (transform de destructuring), corregido ya en
#   0.28.1; vite 8 declara su peer esbuild como ^0.27 || ^0.28, así que 0.28.1 es
#   justo lo que espera. Build y tests verificados verdes con esta versión.
# - js-yaml: subido a >=4.2.0 para GHSA-h67p-54hq-rp68 (CVSS 5.3) en <4.2.0,
#   arrastrado por cosmiconfig 8 (acepta ^4.1.0, 4.2.0 encaja sin breaking).
# - @hono/node-server: OSV detectó GHSA-92pp-h63x-v22m (CVSS 5.3) en versiones
#   <1.19.13, arrastrado por prisma 7 (su HTTP server interno usa hono).
# - yaml (eemeli/yaml, distinto de js-yaml): floor por GHSA-48c2-rrv3-qjmp
#   (DoS por stack overflow, CWE-674) que afecta a <2.8.1. La resolución actual
#   ya trae 2.9.0 vía vite, así que esto es un guard de regresión que impide que
#   un cambio transitivo futuro vuelva a bajar a una versión vulnerable.
# - @opentelemetry/core (+ resources + sdk-trace-base): subidos a >=2.8.0 por
#   GHSA-8988-4f7v-96qf (CVSS 5.3) que OSV detecta en core <2.8.0 (transitivo vía
#   @sentry/node 10.55, que declara su peer como ^2.6.1 y acepta 2.8.0). Se suben
#   los tres paquetes 2.x acoplados a la vez para mantener el SDK otel consistente.
# - picomatch: floor >=4.0.4 por CVE-2026-33671 (HIGH, ReDoS) que Trivy detecta
#   en la imagen api en <4.0.4 (transitivo vía la toolchain de build/test). 4.0.4
#   es semver-compatible con 4.x, así que sube sin breaking. Verificado contra el
#   escaneo de imagen del job image-scan (#112).
# - hono: floor >=4.12.25 por GHSA-88fw-hqm2-52qc (HIGH 7.1) + 4 avisos más
#   (j6c9-x7qj-28xf, rv63-4mwf-qqc2, wgpf-jwqj-8h8p, wwfh-h76j-fc44) en 4.12.23,
#   arrastrado por @prisma/dev 0.24.3 (tooling de prisma 7). 4.12.25 es patch.
# - multer: floor >=2.2.0 por GHSA-72gw-mp4g-v24j (HIGH 7.5) y GHSA-3p4h-7m6x-2hcm
#   (5.3) en <2.2.0, arrastrado por @nestjs/platform-express. Bump menor 2.1→2.2.
# - undici: floor >=7.28.0 por GHSA-vmh5-mc38-953g (HIGH 7.4) y GHSA-pr7r-676h-xcf6
#   (MEDIUM 5.9) en 7.26.0, arrastrado transitivamente por jsdom (vía vitest).
overrides:
  esbuild: '>=0.28.1'
  js-yaml: '>=4.2.0'
  yaml: '>=2.8.1'
  '@hono/node-server': '>=1.19.13'
  '@opentelemetry/core': '>=2.8.0'
  '@opentelemetry/resources': '>=2.8.0'
  '@opentelemetry/sdk-trace-base': '>=2.8.0'
  picomatch: '>=4.0.4'
  hono: '>=4.12.25'
  multer: '>=2.2.0'
  undici: '>=7.28.0'

allowBuilds:
  '@nestjs/core': set this to true or false
  '@prisma/engines': set this to true or false
  '@scarf/scarf': set this to true or false
  '@swc/core': set this to true or false
  esbuild: set this to true or false
  msgpackr-extract: set this to true or false
  prisma: set this to true or false
