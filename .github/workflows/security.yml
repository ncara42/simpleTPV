name: Security

# Escaneo de seguridad sobre GitHub-hosted runners.
# Actions oficiales pinneadas por SHA.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 8 * * 1' # lunes 08:00 UTC

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  # -----------------------------------------------------------------------
  # Detección de secretos en el historial git completo
  # -----------------------------------------------------------------------
  gitleaks:
    name: Gitleaks (secrets)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # -----------------------------------------------------------------------
  # Análisis estático (SAST) — Semgrep
  # Reglas: typescript, nodejs, secrets, owasp-top-ten.
  # -----------------------------------------------------------------------
  semgrep:
    name: Semgrep (SAST)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    container:
      # Pinneada por DIGEST inmutable (SEC-21), igual que las Actions por SHA: un tag
      # mutable (:latest) permitiría que una imagen reetiquetada se ejecutara con el
      # checkout del repo. Migrada al nombre actual `semgrep/semgrep` (returntocorp
      # está deprecado). Dependabot (github-actions) actualiza el digest.
      image: semgrep/semgrep@sha256:7cad2bc2d1e44f87f0bf4be6d1fa23aa90fb72015bebc89fb91385d813987a03
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Run Semgrep
        run: |
          semgrep scan \
            --config=p/typescript \
            --config=p/nodejs \
            --config=p/secrets \
            --config=p/owasp-top-ten \
            --error \
            --exclude=node_modules \
            --exclude=dist \
            --exclude=build \
            --exclude=coverage \
            --exclude='*.spec.ts' \
            --exclude='*.test.ts' \
            --exclude=data \
            --exclude=generated

  # -----------------------------------------------------------------------
  # Vulnerabilidades conocidas en el lockfile (pnpm)
  # -----------------------------------------------------------------------
  osv:
    name: OSV Scanner (pnpm-lock)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Run OSV Scanner
        uses: google/osv-scanner-action/osv-scanner-action@9a498708959aeaef5ef730655706c5a1df1edbc2 # v2.3.8
        with:
          scan-args: |-
            --lockfile=./pnpm-lock.yaml
