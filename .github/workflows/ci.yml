name: CI

# Quality gate. Cada PR y cada push a main pasa lint + typecheck
# + build sobre el monorepo TypeScript. El workspace Rust tiene su
# propio workflow (rust.yml) para fmt + clippy + test.
#
# Actions pinneadas por SHA con comentario de versión: una credencial de
# maintainer robada no puede reetiquetar. Dependabot propone upgrades.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  quality:
    name: Lint, typecheck y build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          version: 11.1.3

      - name: Setup Node 22
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # El cliente Prisma generado es prerrequisito de compilación.
      - name: Generate Prisma client
        run: pnpm --filter @simpletpv/db exec prisma generate

      # Aviso informativo, NO gate. El gate de vulnerabilidades de dependencias
      # que bloquea el merge vive en `security.yml` (OSV Scanner sobre
      # pnpm-lock.yaml, sin continue-on-error) + Trivy filesystem. `pnpm audit`
      # usa la base de avisos de npm (distinta de OSV) y se mantiene como señal
      # temprana no bloqueante para evitar falsos rojos por divergencia entre
      # bases; si reporta algo, se revisa contra el resultado de OSV.
      - name: Audit dependencies (informativo — gate real en security.yml/OSV)
        run: pnpm audit --audit-level=high --prod
        continue-on-error: true

      - name: Lint
        run: pnpm lint

      - name: Detect unused code (knip)
        run: pnpm knip
        continue-on-error: true

      - name: Type-check
        run: pnpm typecheck

      # El workspace Rust tiene su propio workflow (rust.yml) para fmt + clippy + test.
      # Este job solo cubre el monorepo TypeScript (frontends + packages).

      - name: Build apps
        run: pnpm build

  # -----------------------------------------------------------------------
  # E2E smoke tests — Playwright / Chromium
  # Postgres efímero via services: nativo de Actions.
  # RLS: el seed corre como superuser (BYPASSRLS); los tests E2E acceden
  # al backend Rust, que internamente fija el rol aplicación vía SQLx.
  # El binario se compila en debug (cargo build sin --release) para que
  # cfg!(debug_assertions) → false en CORS production check → dev fallback.
  # -----------------------------------------------------------------------
  e2e:
    name: E2E smoke test (Playwright)
    runs-on: ubuntu-latest
    needs: [quality]
    timeout-minutes: 25
    permissions:
      contents: read

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: simpletpv
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 3s
          --health-timeout 5s
          --health-retries 10
        ports:
          - 5432:5432
      redis:
        image: redis:7.4-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 3s
          --health-timeout 5s
          --health-retries 10
        ports:
          - 6379:6379

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/simpletpv?schema=public
      DATABASE_URL_APP: postgresql://app:app_dev_password@localhost:5432/simpletpv?schema=public
      DATABASE_URL_AUTH: postgresql://app_admin:app_admin_dev_password@localhost:5432/simpletpv?schema=public
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: ci-e2e-access-secret
      JWT_REFRESH_SECRET: ci-e2e-refresh-secret
      COOKIE_SECURE: 'false'
      CARGO_TERM_COLOR: always

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          version: 11.1.3

      - name: Setup Node 22
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @simpletpv/db exec prisma generate

      - name: Bootstrap dev roles (app / app_admin)
        env:
          PGPASSWORD: postgres
        run: |
          psql -h localhost -p 5432 -U postgres -d simpletpv \
            -f packages/db/scripts/dev-bootstrap.sql

      - name: Build apps
        run: pnpm build

      # --- Backend Rust ---
      # El binario aplica las migraciones sqlx al arrancar (sqlx::migrate!()),
      # eliminando la dependencia de Prisma Migrate / Node.js en el despliegue.
      - name: Rust toolchain
        working-directory: crates
        run: |
          rustup show active-toolchain || rustup toolchain install stable
          rustup component add rustfmt clippy

      - name: Cache cargo + target
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: crates

      - name: Build Rust binary (debug)
        working-directory: crates
        run: cargo build --bin simpletpv-api

      - name: Start API (auto-migrate + serve)
        run: |
          ./crates/target/debug/simpletpv-api > /tmp/api.log 2>&1 &
          echo $! > /tmp/api.pid
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3001/health >/dev/null 2>&1; then
              echo "API healthy tras ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "API no respondió en 30s — log:"
          cat /tmp/api.log
          exit 1

      # El seed corre DESPUÉS de que el binario Rust haya aplicado las migraciones
      # (sqlx::migrate!() al arrancar). Prisma Client se usa solo para poblar datos
      # de test; el esquema ya existe gracias a las migraciones sqlx embebidas.
      - name: Seed datos demo (e2e)
        run: pnpm --filter @simpletpv/db db:seed:demo

      - name: Install Playwright Chromium
        run: pnpm --filter @simpletpv/tpv exec playwright install --with-deps chromium

      - name: Run E2E tests (TPV)
        run: pnpm --filter @simpletpv/tpv test:e2e

      - name: Run E2E tests (Backoffice)
        run: pnpm --filter @simpletpv/backoffice test:e2e

      - name: Upload Playwright reports
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-report
          path: |
            apps/tpv/test-results/
            apps/tpv/playwright-report/
            apps/backoffice/test-results/
            apps/backoffice/playwright-report/
            /tmp/api.log
          retention-days: 7

      - name: Stop API
        if: always()
        run: |
          if [ -f /tmp/api.pid ]; then
            kill "$(cat /tmp/api.pid)" 2>/dev/null || true
          fi

  # -----------------------------------------------------------------------
  # Deploy a producción — solo en push a main, tras pasar quality + e2e.
  # Usa la API autenticada de Dokploy (application.deploy) en lugar del webhook
  # de rama /api/deploy/<token>. La API con x-api-key dispara el redeploy
  # directamente. Requiere los secrets DOKPLOY_API_URL, DOKPLOY_API_KEY y
  # DOKPLOY_API_APP_ID (applicationId de la app `rust` en Dokploy).
  # -----------------------------------------------------------------------
  deploy:
    name: Deploy a producción (Dokploy)
    runs-on: ubuntu-latest
    needs: [e2e]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    timeout-minutes: 5
    permissions: {}
    steps:
      - name: Trigger redeploy
        env:
          DOKPLOY_API_URL: ${{ secrets.DOKPLOY_API_URL }}
          DOKPLOY_API_KEY: ${{ secrets.DOKPLOY_API_KEY }}
          DOKPLOY_API_APP_ID: ${{ secrets.DOKPLOY_API_APP_ID }}
        run: |
          if [ -z "$DOKPLOY_API_URL" ] || [ -z "$DOKPLOY_API_KEY" ] || [ -z "$DOKPLOY_API_APP_ID" ]; then
            echo "::warning::Faltan secrets de Dokploy (DOKPLOY_API_URL / DOKPLOY_API_KEY / DOKPLOY_API_APP_ID) — saltando deploy"
            exit 0
          fi
          # application.deploy: POST autenticado con x-api-key. Dokploy responde 2xx
          # al aceptar la orden de redeploy (no espera a que termine el build).
          code=$(curl -sS \
            -o /dev/null \
            -w "%{http_code}" \
            -X POST \
            -H "x-api-key: $DOKPLOY_API_KEY" \
            -H "Content-Type: application/json" \
            -d "{\"applicationId\":\"$DOKPLOY_API_APP_ID\"}" \
            "${DOKPLOY_API_URL%/}/api/application.deploy")
          echo "Dokploy application.deploy HTTP $code"
          # Una respuesta no-2xx (p.ej. 401 por token caducado) significa que el
          # redeploy NO se ha disparado: prod se quedaría en una versión antigua
          # mientras CI reporta verde. Fail-fast para que el fallo sea visible y
          # no pase desapercibido (INFRA-05 / CWE-754).
          case "$code" in
            2*) echo "Redeploy disparado." ;;
            *)
              echo "::error::Dokploy application.deploy devolvió $code (esperado 2xx) — deploy no disparado, revisa los secrets DOKPLOY_API_*"
              exit 1
              ;;
          esac
