version: 2

# Solo actualizaciones de SEGURIDAD.
# open-pull-requests-limit: 0 desactiva las PRs de versiones rutinarias.
# Las PRs de vulnerabilidades (Dependabot security updates) NO están sujetas
# a este límite y se siguen abriendo si hay un aviso de seguridad.
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 0
    labels: [dependencies, ci-cd]

  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 0
    labels: [dependencies]
